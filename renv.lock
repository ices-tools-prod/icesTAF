      "Authors@R": "c(person(\"Arni\", \"Magnusson\", role=c(\"aut\",\"cre\"), email=\"thisisarni@gmail.com\"), person(\"Colin\", \"Millar\", role=\"aut\"), person(\"Iago\", \"Mosqueira\", role=\"aut\"), person(\"Alexandros\", \"Kokkalis\", role=\"ctb\"), person(\"Ibrahim\", \"Umar\", role=\"ctb\"), person(\"Hjalte\", \"Parner\", role=\"ctb\"))",
